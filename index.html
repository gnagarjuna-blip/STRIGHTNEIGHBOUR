<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BIET - Advanced Neighbor Tracker</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #080808; color: #eee; padding: 20px; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1150px; }
        .header { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; align-items: center; margin-bottom: 20px; }
        .stat-group { display: flex; flex-direction: column; }
        .label { font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-family: monospace; font-weight: bold; font-size: 22px; }
        .win { color: #2ecc71; } .loss { color: #e74c3c; }

        .config-bar { background: #111; padding: 15px; border-radius: 12px; border: 1px solid #444; margin-bottom: 20px; display: flex; gap: 20px; }
        .sim-area { background: #111; padding: 15px; border-radius: 12px; border: 1px solid #444; margin-bottom: 20px; display: none; }
        textarea { background: #000; color: #2ecc71; border: 1px solid #333; width: 100%; height: 100px; padding: 10px; box-sizing: border-box; font-family: monospace; resize: none; margin-top: 10px; }
        
        .neighbor-display { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .n-box { background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px solid #333; min-height: 50px; }
        .n-list { color: #f1c40f; font-weight: bold; font-size: 18px; word-spacing: 8px; }

        .roulette-table { 
            display: grid; grid-template-columns: 60px repeat(12, 1fr); grid-template-rows: repeat(3, 80px); 
            gap: 4px; background: #064e3b; padding: 10px; border: 8px solid #3d2b1f; border-radius: 12px; 
        }
        .cell { 
            position: relative; display: flex; align-items: center; justify-content: center; 
            font-size: 22px; font-weight: bold; color: white; cursor: pointer; border-radius: 4px; 
            transition: all 0.1s ease; border: 1px solid rgba(255,255,255,0.1);
        }
        .zero { grid-row: span 3; background: #059669; }
        .red { background: #dc2626; }
        .black { background: #18181b; }
        .cell.last-hit { border: 3px solid #f1c40f !important; box-shadow: inset 0 0 15px rgba(241, 196, 15, 0.5); }

        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .info-card { background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        input { background: #000; color: #fff; border: 1px solid #444; width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        .btn { padding: 12px; border: 0; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .mode-select { background: #2c3e50; color: #fff; padding: 10px; border-radius: 8px; border: 1px solid #34495e; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="stat-group">
            <span class="label">Bankroll</span>
            <span id="displayBankroll" class="val">1000.00</span>
        </div>
        <div class="stat-group">
            <span class="label">Current Bet</span>
            <span id="displayBet" class="val">0.00</span>
        </div>
        <div class="stat-group">
            <span class="label">Loss Streak</span>
            <span id="displayStreak" class="val" style="color:#e67e22">0</span>
        </div>
        <div class="stat-group" style="text-align:right">
            <span class="label">Total Profit</span>
            <span id="netTotal" class="val">0.00</span>
        </div>
    </div>

    <div class="config-bar">
        <div style="flex:1">
            <span class="label">Operation Mode</span>
            <select id="modeDropdown" class="mode-select" onchange="toggleMode()">
                <option value="manual">MANUAL INPUT</option>
                <option value="sim">SIMULATION (BULK)</option>
            </select>
        </div>
        <div style="flex:1">
            <span class="label">Starting Bankroll</span>
            <input type="number" id="inputBankroll" value="1000" onchange="resetStats()">
        </div>
        <div style="flex:1">
            <span class="label">Base Unit Size</span>
            <input type="number" id="inputUnit" value="10" onchange="resetStats()">
        </div>
    </div>

    <div id="simArea" class="sim-area">
        <span class="label">Paste History (50-1000 numbers)</span>
        <textarea id="bulkData" placeholder="Example: 12, 32, 5, 0 11 23..."></textarea>
        <button class="btn" style="background:#27ae60; width:100%; margin-top:10px;" onclick="runSimulation()">PROCESS HISTORY</button>
    </div>

    <div class="neighbor-display">
        <div class="n-box">
            <span class="label">Left Neighbors (Occurrences)</span>
            <div id="leftNeighbors" class="n-list">-</div>
        </div>
        <div class="n-box">
            <span class="label">Right Neighbors (Occurrences)</span>
            <div id="rightNeighbors" class="n-list">-</div>
        </div>
    </div>

    <div class="roulette-table" id="table">
        <div id="cell-0" class="cell zero" onclick="inputNum(0)">0</div>
    </div>

    <div class="controls">
        <button class="btn" style="background:#c0392b; grid-column: span 2" onclick="undo()">UNDO LAST</button>
        <button class="btn" style="background:#333; grid-column: span 2" onclick="location.reload()">FULL RESET</button>
    </div>
</div>

<script>
    const reds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
    let history = [];
    let stats = {
        profit: 0,
        lossStreak: 0,
        currentUnitMult: 1,
        bankroll: 1000
    };
    let stateHistory = [];

    // Build Table
    const table = document.getElementById('table');
    for (let col = 1; col <= 12; col++) {
        for (let row = 3; row >= 1; row--) {
            let num = (col - 1) * 3 + row;
            let div = document.createElement('div');
            div.id = `cell-${num}`;
            div.className = `cell ${reds.includes(num) ? 'red' : 'black'}`;
            div.style.gridColumn = col + 1; div.style.gridRow = 4 - row;
            div.innerHTML = num;
            div.onclick = () => inputNum(num); table.appendChild(div);
        }
    }

    function toggleMode() {
        const mode = document.getElementById('modeDropdown').value;
        document.getElementById('simArea').style.display = (mode === 'sim') ? 'block' : 'none';
    }

    function resetStats() {
        stats.bankroll = parseFloat(document.getElementById('inputBankroll').value);
        stats.profit = 0;
        stats.lossStreak = 0;
        stats.currentUnitMult = 1;
        updateUI();
    }

    function inputNum(n) {
        stateHistory.push(JSON.stringify({history: [...history], stats: {...stats}}));
        
        // Progression Logic: Every 4 losses increase 1 unit. Win back to base.
        // For this logic, we assume we are tracking if the 'last hit' was in our neighbor predictions
        // Note: First few numbers won't have predictions
        if (history.length > 0) {
            const lastPredictions = calculateNeighbors(history[history.length-1]);
            const baseUnit = parseFloat(document.getElementById('inputUnit').value);
            const currentBet = baseUnit * stats.currentUnitMult;

            // Simplified bet logic: if we have neighbors, we bet on all of them
            // To keep it simple for the user, we track "Win/Loss" based on if current 'n' was a neighbor
            const predictedNums = [...lastPredictions.left, ...lastPredictions.right];
            
            if (predictedNums.length > 0) {
                if (predictedNums.includes(n)) {
                    // WIN
                    let winAmt = (currentBet * 35) - (predictedNums.length * currentBet);
                    stats.profit += winAmt;
                    stats.bankroll += winAmt;
                    stats.lossStreak = 0;
                    stats.currentUnitMult = 1;
                } else {
                    // LOSS
                    let lossAmt = (predictedNums.length * currentBet);
                    stats.profit -= lossAmt;
                    stats.bankroll -= lossAmt;
                    stats.lossStreak++;
                    // Progression: Every 4 losses increase 1 unit
                    stats.currentUnitMult = Math.floor(stats.lossStreak / 4) + 1;
                }
            }
        }

        history.push(n);
        updateUI();
        showNeighbors(n);
        
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('last-hit'));
        document.getElementById(`cell-${n}`).classList.add('last-hit');
    }

    function calculateNeighbors(target) {
        let lefts = [];
        let rights = [];
        for (let i = 0; i < history.length; i++) {
            if (history[i] === target) {
                if (i > 0) lefts.push(history[i-1]);
                if (i < history.length - 1) rights.push(history[i+1]);
            }
        }
        return {
            left: [...new Set(lefts)].sort((a,b) => a - b),
            right: [...new Set(rights)].sort((a,b) => a - b)
        };
    }

    function showNeighbors(n) {
        const res = calculateNeighbors(n);
        document.getElementById('leftNeighbors').innerText = res.left.length ? res.left.join(' ') : 'None';
        document.getElementById('rightNeighbors').innerText = res.right.length ? res.right.join(' ') : 'None';
    }

    function runSimulation() {
        const raw = document.getElementById('bulkData').value;
        const nums = raw.split(/[\s,]+/).filter(x => x !== "").map(Number);
        if(nums.length < 1) return;
        
        resetStats();
        history = [];
        nums.forEach(n => inputNum(n));
    }

    function updateUI() {
        document.getElementById('netTotal').innerText = stats.profit.toFixed(2);
        document.getElementById('netTotal').className = `val ${stats.profit >= 0 ? 'win' : 'loss'}`;
        document.getElementById('displayBankroll').innerText = stats.bankroll.toFixed(2);
        document.getElementById('displayStreak').innerText = stats.lossStreak;
        
        const baseUnit = parseFloat(document.getElementById('inputUnit').value);
        document.getElementById('displayBet').innerText = (baseUnit * stats.currentUnitMult).toFixed(2) + " (" + stats.currentUnitMult + "u)";
    }

    function undo() {
        if (stateHistory.length > 0) {
            const lastState = JSON.parse(stateHistory.pop());
            history = lastState.history;
            stats = lastState.stats;
            updateUI();
            if (history.length > 0) {
                const lastNum = history[history.length-1];
                showNeighbors(lastNum);
                document.querySelectorAll('.cell').forEach(c => c.classList.remove('last-hit'));
                document.getElementById(`cell-${lastNum}`).classList.add('last-hit');
            }
        }
    }

    updateUI();
</script>
</body>
</html>
