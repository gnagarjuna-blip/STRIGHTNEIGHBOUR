<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Strategy Sniper & Simulator</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; width: 100%; max-width: 800px; }
        .stat-box { background: #2d2d2d; padding: 15px; border-radius: 8px; text-align: center; border-bottom: 4px solid #4CAF50; }
        .stat-box.loss { border-color: #f44336; }
        .stat-val { font-size: 24px; font-weight: bold; display: block; }
        
        .controls { background: #333; padding: 20px; border-radius: 8px; margin-bottom: 20px; width: 100%; max-width: 800px; }
        select, button { padding: 10px; font-size: 16px; cursor: pointer; border-radius: 4px; border: none; }
        button { background: #4CAF50; color: white; font-weight: bold; }
        button:hover { background: #45a049; }

        .roulette-grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 5px; background: #064e3b; padding: 15px; border-radius: 10px; border: 4px solid #ffd700; margin-bottom: 20px; }
        .cell { width: 40px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); }
        .red { background: #e11d48; }
        .black { background: #18181b; }
        .zero { background: #16a34a; grid-row: span 3; height: 160px; }
        .cell:hover { opacity: 0.8; transform: scale(1.05); }

        .log { background: #000; padding: 10px; height: 150px; overflow-y: auto; width: 100%; max-width: 800px; font-family: monospace; font-size: 13px; border: 1px solid #444; }
        .green-txt { color: #4CAF50; }
        .red-txt { color: #f44336; }
    </style>
</head>
<body>

    <h2>🎰 Strategy Sniper & Simulator</h2>

    <div class="dashboard">
        <div class="stat-box">Bankroll <span id="bankroll" class="stat-val">1000</span></div>
        <div class="stat-box">Profit <span id="profit" class="stat-val">0</span></div>
        <div class="stat-box">Peak Profit <span id="peakProfit" class="stat-val">0</span></div>
        <div class="stat-box loss">Peak Loss <span id="peakLoss" class="stat-val">0</span></div>
    </div>

    <div class="controls">
        <label>Select Strategy:</label>
        <select id="strategySelect">
            <option value="mirror">1. Mirror Pattern (Wait for 13-24 x3)</option>
            <option value="triangle">2. Triangle Strategy (Wait for Even Streets x2)</option>
            <option value="follower">3. Follow Leader (Wait for Color x3)</option>
        </select>
        <button onclick="runSimulation()">Run 500 Spin Sim</button>
        <button onclick="resetStats()" style="background:#666">Reset</button>
    </div>

    <div class="roulette-grid" id="board">
        </div>

    <div class="log" id="log">--- Click a number to track manually or Run Simulation ---</div>

<script>
    let bankroll = 1000;
    let initialBankroll = 1000;
    let peakProfit = 0;
    let peakLoss = 0;
    let history = [];

    const redNumbers = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

    // Initialize Board
    const board = document.getElementById('board');
    let zeroCell = document.createElement('div');
    zeroCell.className = 'cell zero';
    zeroCell.innerText = '0';
    zeroCell.onclick = () => recordNumber(0);
    board.appendChild(zeroCell);

    for(let i=1; i<=36; i++) {
        let cell = document.createElement('div');
        let color = redNumbers.includes(i) ? 'red' : 'black';
        cell.className = `cell ${color}`;
        cell.innerText = i;
        cell.onclick = () => recordNumber(i);
        board.appendChild(cell);
    }

    function recordNumber(num) {
        history.push(num);
        updateLog(`Number hit: ${num}`);
        // Here you could trigger manual betting logic
    }

    function getDoubleStreet(num) {
        if (num === 0) return 0;
        return Math.ceil(num / 6);
    }

    function getColor(num) {
        if (num === 0) return 'green';
        return redNumbers.includes(num) ? 'red' : 'black';
    }

    function updateLog(msg, colorClass = "") {
        const log = document.getElementById('log');
        log.innerHTML = `<div class="${colorClass}">${msg}</div>` + log.innerHTML;
    }

    function resetStats() {
        bankroll = 1000;
        peakProfit = 0;
        peakLoss = 0;
        history = [];
        updateUI();
        document.getElementById('log').innerHTML = "Stats Reset.";
    }

    function updateUI() {
        let currentProfit = bankroll - initialBankroll;
        document.getElementById('bankroll').innerText = bankroll;
        document.getElementById('profit').innerText = currentProfit;
        if (currentProfit > peakProfit) peakProfit = currentProfit;
        if (currentProfit < peakLoss) peakLoss = currentProfit;
        document.getElementById('peakProfit').innerText = peakProfit;
        document.getElementById('peakLoss').innerText = peakLoss;
    }

    function runSimulation() {
        const strat = document.getElementById('strategySelect').value;
        updateLog(`Starting simulation for ${strat}...`, "green-txt");
        
        for (let i = 0; i < 500; i++) {
            let roll = Math.floor(Math.random() * 37);
            history.push(roll);

            // Strategy Logic
            if (history.length > 5) {
                let last3 = history.slice(-3);
                let last2 = history.slice(-2);
                let trigger = false;
                let betAmount = 0;
                let betStreets = [];

                if (strat === 'mirror') {
                    // Trigger: Last 3 numbers were 13-24 (Street 3 or 4)
                    if (last3.every(n => n >= 13 && n <= 24)) {
                        trigger = true;
                        betStreets = [1, 6]; 
                        betAmount = 2; // 1 unit each
                    }
                } else if (strat === 'triangle') {
                    // Trigger: Last 2 numbers were Even Streets (2, 4, 6)
                    if (last2.every(n => getDoubleStreet(n) % 2 === 0 && n !== 0)) {
                        trigger = true;
                        betStreets = [1, 3, 5];
                        betAmount = 3;
                    }
                } else if (strat === 'follower') {
                    // Trigger: Last 3 were same color
                    if (last3.every(n => getColor(n) === getColor(last3[0]) && n !== 0)) {
                        trigger = true;
                        let lastNum = history[history.length-1];
                        let currentSt = getDoubleStreet(lastNum);
                        let nextSt = currentSt === 6 ? 5 : currentSt + 1;
                        betStreets = [currentSt, nextSt];
                        betAmount = 2;
                    }
                }

                if (trigger) {
                    bankroll -= betAmount;
                    let resultNum = Math.floor(Math.random() * 37);
                    let resultStreet = getDoubleStreet(resultNum);
                    
                    if (betStreets.includes(resultStreet)) {
                        bankroll += 6; // Payout 5:1 + stake
                        updateLog(`WIN on ${resultNum}! +${6-betAmount} units`, "green-txt");
                    } else {
                        updateLog(`LOSS on ${resultNum}. -${betAmount} units`, "red-txt");
                    }
                    history.push(resultNum); // Add result to history
                }
            }
            updateUI();
        }
    }
</script>
</body>
</html>
