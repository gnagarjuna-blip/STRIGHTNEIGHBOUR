<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Double Street Sniper v3</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .stats-bar { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 950px; }
        .stat-card { background: #1e1e1e; padding: 10px; border-radius: 8px; flex: 1; text-align: center; border: 1px solid #333; }
        .stat-val { font-size: 20px; font-weight: bold; display: block; color: #4CAF50; }
        .stat-val.neg { color: #f44336; }

        .controls { background: #252525; padding: 15px; border-radius: 10px; margin-bottom: 20px; width: 100%; max-width: 950px; display: flex; gap: 15px; align-items: flex-end; }
        input, select, button { background: #333; color: white; border: 1px solid #444; padding: 8px; border-radius: 4px; }
        button { background: #15803d; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #16a34a; }

        /* Real Table Layout */
        .table-area { background: #064e3b; padding: 30px; border-radius: 15px; border: 8px solid #3d2b1f; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .roulette-grid { display: grid; grid-template-columns: 60px repeat(12, 60px); grid-template-rows: repeat(3, 50px); gap: 2px; }
        .cell { border: 1px solid rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; position: relative; }
        .red { background: #b91c1c; }
        .black { background: #18181b; }
        .zero { grid-row: span 3; background: #15803d; }

        /* Double Street Visuals */
        .highlight-street { box-shadow: inset 0 0 15px 5px #ffd700; border: 1px solid #ffd700; }
        .chip { position: absolute; width: 28px; height: 28px; background: #ffd700; border: 2px dashed #000; border-radius: 50%; color: #000; 
                display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; z-index: 100; box-shadow: 0 2px 4px #000;
                top: -15px; right: -15px; /* Positioned at the intersection/corner */
        }

        .bottom-section { display: flex; gap: 15px; width: 100%; max-width: 950px; margin-top: 20px; height: 200px; }
        .log { flex: 2; background: #000; padding: 10px; overflow-y: auto; font-family: monospace; border: 1px solid #333; }
        .paste-area { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        textarea { background: #222; color: #4CAF50; height: 100%; border-radius: 4px; padding: 10px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div class="stat-card">Bankroll<span id="bank" class="stat-val">1000</span></div>
        <div class="stat-card">Profit<span id="profit" class="stat-val">0</span></div>
        <div class="stat-card">Current Bet<span id="curBet" class="stat-val" style="color:#ffd700">0</span></div>
        <div class="stat-card">Progression Step<span id="step" class="stat-val">1</span></div>
    </div>

    <div class="controls">
        <div style="display:flex; flex-direction:column">
            <label>Initial Bankroll</label>
            <input type="number" id="startBank" value="1000">
        </div>
        <div style="display:flex; flex-direction:column">
            <label>Unit Size</label>
            <input type="number" id="unitSize" value="5">
        </div>
        <div style="display:flex; flex-direction:column">
            <label>Strategy</label>
            <select id="strat">
                <option value="mirror">Mirror (Ends)</option>
                <option value="triangle">Triangle (Checker)</option>
                <option value="follower">Follow Leader</option>
            </select>
        </div>
        <button onclick="resetGame()">RESET</button>
        <button onclick="runSim()" style="background:#2563eb">SIMULATE 200</button>
    </div>

    <div class="table-area">
        <div class="roulette-grid" id="grid">
            </div>
    </div>

    <div class="bottom-section">
        <div class="log" id="log">-- Sniper Active: Waiting for trigger --</div>
        <div class="paste-area">
            <textarea id="pasteIn" placeholder="Paste history numbers..."></textarea>
            <button onclick="handlePaste()">Process Paste</button>
        </div>
    </div>

<script>
    const redNums = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
    let bank = 1000, initial = 1000, unit = 5, step = 1, history = [];
    const progression = [1, 1, 2, 4, 8, 16]; // Multipliers for recovery

    function buildTable() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '<div class="cell zero" onclick="inputNum(0)">0</div>';
        const rows = [[3,6,9,12,15,18,21,24,27,30,33,36], [2,5,8,11,14,17,20,23,26,29,32,35], [1,4,7,10,13,16,19,22,25,28,31,34]];
        rows.forEach(row => {
            row.forEach(n => {
                let color = redNums.includes(n) ? 'red' : 'black';
                grid.innerHTML += `<div class="cell ${color}" id="c${n}" onclick="inputNum(${n})">${n}</div>`;
            });
        });
    }

    function resetGame() {
        initial = parseFloat(document.getElementById('startBank').value);
        bank = initial; unit = parseFloat(document.getElementById('unitSize').value);
        step = 1; history = [];
        updateUI(); addLog("System Reset", "yellow");
        clearTable();
    }

    function inputNum(n) {
        history.push(n);
        processLogic(n);
        updateUI();
    }

    function processLogic(currentRoll) {
        clearTable();
        if (history.length < 4) return;

        let strat = document.getElementById('strat').value;
        let last3 = history.slice(-4, -1);
        let last2 = history.slice(-3, -1);
        let betStreets = [];

        // Check Triggers
        if(strat === 'mirror' && last3.every(x => x >= 13 && x <= 24)) betStreets = [1, 6];
        else if(strat === 'triangle' && last2.every(x => Math.ceil(x/6) % 2 === 0 && x !== 0)) betStreets = [1, 3, 5];
        else if(strat === 'follower') {
            let lastColor = redNums.includes(history[history.length-2]) ? 'r' : 'b';
            if(last3.every(x => (redNums.includes(x) ? 'r' : 'b') === lastColor && x !== 0)) {
                let ds = Math.ceil(history[history.length-2]/6);
                betStreets = [ds, ds === 6 ? 5 : ds+1];
            }
        }

        if (betStreets.length > 0) {
            let betAmount = betStreets.length * (unit * progression[step-1]);
            document.getElementById('curBet').innerText = betAmount;
            bank -= betAmount;

            // Highlight and place chip on the "Double Street Line"
            betStreets.forEach(s => placeStreetChip(s, unit * progression[step-1]));

            let win = betStreets.includes(Math.ceil(currentRoll/6)) && currentRoll !== 0;
            if (win) {
                let payout = (unit * progression[step-1]) * 6;
                bank += payout;
                addLog(`WIN ${currentRoll}! +${payout - betAmount}`, "#4CAF50");
                step = 1; // Reset progression
            } else {
                addLog(`LOSS ${currentRoll}. -${betAmount}`, "#f44336");
                step = (step < progression.length) ? step + 1 : 1; // Increment progression
            }
        } else {
            document.getElementById('curBet').innerText = 0;
        }
    }

    function placeStreetChip(street, val) {
        let lastNumOfStreet = street * 6;
        // Find cell on the top row of that street to place chip on the intersection
        let anchorCell = document.getElementById(`c${lastNumOfStreet}`);
        anchorCell.classList.add('highlight-street');
        // Visually highlight all 6 numbers in the street
        for(let i=(street*6)-5; i<=street*6; i++) {
            document.getElementById(`c${i}`).classList.add('highlight-street');
        }
        anchorCell.innerHTML += `<div class="chip">${val}</div>`;
    }

    function clearTable() {
        document.querySelectorAll('.cell').forEach(c => {
            c.classList.remove('highlight-street');
            let chip = c.querySelector('.chip');
            if(chip) chip.remove();
        });
    }

    function updateUI() {
        document.getElementById('bank').innerText = bank;
        document.getElementById('profit').innerText = bank - initial;
        document.getElementById('step').innerText = step;
    }

    function addLog(m, color) {
        let l = document.getElementById('log');
        l.innerHTML = `<div style="color:${color}">${m}</div>` + l.innerHTML;
    }

    function handlePaste() {
        let nums = document.getElementById('pasteIn').value.split(/[\s,]+/).map(Number);
        nums.forEach(n => { if(!isNaN(n)) inputNum(n); });
        document.getElementById('pasteIn').value = '';
    }

    function runSim() {
        for(let i=0; i<200; i++) inputNum(Math.floor(Math.random() * 37));
    }

    buildTable();
</script>
</body>
</html>
