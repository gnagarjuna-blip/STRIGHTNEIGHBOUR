<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BIET - Advanced Neighbor Tracker</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #080808; color: #eee; padding: 20px; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1150px; }
        .header { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; align-items: center; margin-bottom: 20px; }
        .stat-group { display: flex; flex-direction: column; }
        .label { font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-family: monospace; font-weight: bold; font-size: 22px; }
        .win { color: #2ecc71; } .loss { color: #e74c3c; }

        .config-bar { background: #111; padding: 15px; border-radius: 12px; border: 1px solid #444; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .sim-area { background: #111; padding: 15px; border-radius: 12px; border: 1px solid #444; margin-bottom: 20px; }
        textarea { background: #000; color: #2ecc71; border: 1px solid #333; width: 100%; height: 80px; padding: 10px; box-sizing: border-box; font-family: monospace; resize: none; margin-top: 10px; border-radius: 4px; }
        
        .neighbor-display { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .n-box { background: #1a1a1a; padding: 12px; border-radius: 8px; border: 1px solid #333; min-height: 60px; text-align: center; }
        .n-list { color: #f1c40f; font-weight: bold; font-size: 24px; word-spacing: 15px; margin-top: 5px; min-height: 30px; }

        .roulette-table { 
            display: grid; grid-template-columns: 60px repeat(12, 1fr); grid-template-rows: repeat(3, 80px); 
            gap: 4px; background: #064e3b; padding: 10px; border: 8px solid #3d2b1f; border-radius: 12px; 
        }
        .cell { 
            position: relative; display: flex; align-items: center; justify-content: center; 
            font-size: 22px; font-weight: bold; color: white; cursor: pointer; border-radius: 4px; 
            transition: all 0.1s ease; border: 1px solid rgba(255,255,255,0.1);
        }
        .zero { grid-row: span 3; background: #059669; }
        .red { background: #dc2626; }
        .black { background: #18181b; }
        .cell.last-hit { border: 3px solid #f1c40f !important; box-shadow: inset 0 0 15px rgba(241, 196, 15, 0.5); }

        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .btn { padding: 12px; border: 0; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; text-transform: uppercase; }
        input, select { background: #000; color: #fff; border: 1px solid #444; width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="stat-group"><span class="label">Bankroll</span><span id="displayBankroll" class="val">1000.00</span></div>
        <div class="stat-group"><span class="label">Bet / Unit</span><span id="displayBet" class="val">0.00</span></div>
        <div class="stat-group"><span class="label">Loss Streak</span><span id="displayStreak" class="val" style="color:#e67e22">0</span></div>
        <div class="stat-group" style="text-align:right"><span class="label">Profit/Loss</span><span id="netTotal" class="val">0.00</span></div>
    </div>

    <div class="config-bar">
        <div>
            <span class="label">Mode Selection</span>
            <select id="modeDropdown" onchange="toggleMode()">
                <option value="manual">Manual + Initial Paste</option>
                <option value="sim">Full Simulation</option>
            </select>
        </div>
        <div><span class="label">Starting Bankroll</span><input type="number" id="inputBankroll" value="1000" onchange="resetStats()"></div>
        <div><span class="label">Base Unit</span><input type="number" id="inputUnit" value="10" onchange="resetStats()"></div>
    </div>

    <div id="simArea" class="sim-area">
        <span id="areaLabel" class="label">Initial History / Bulk Data</span>
        <textarea id="bulkData" placeholder="Paste 50-1000 numbers here..."></textarea>
        <button id="processBtn" class="btn" style="background:#27ae60; width:100%; margin-top:10px;" onclick="handleBulk()">Load Data into History</button>
    </div>

    <div class="neighbor-display">
        <div class="n-box"><span class="label">Left Neighbors (Sorted)</span><div id="leftNeighbors" class="n-list"></div></div>
        <div class="n-box"><span class="label">Right Neighbors (Sorted)</span><div id="rightNeighbors" class="n-list"></div></div>
    </div>

    <div class="roulette-table" id="table">
        <div id="cell-0" class="cell zero" onclick="inputNum(0)">0</div>
    </div>

    <div class="controls">
        <button class="btn" style="background:#c0392b; grid-column: span 2" onclick="undo()">UNDO</button>
        <button class="btn" style="background:#333; grid-column: span 2" onclick="location.reload()">RESET ALL</button>
    </div>
</div>

<script>
    const reds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
    let history = [];
    let stateHistory = [];
    let stats = { profit: 0, lossStreak: 0, currentUnitMult: 1, bankroll: 1000 };
    let currentPredictions = [];

    // Initialize Table
    const table = document.getElementById('table');
    for (let col = 1; col <= 12; col++) {
        for (let row = 3; row >= 1; row--) {
            let num = (col - 1) * 3 + row;
            let div = document.createElement('div');
            div.id = `cell-${num}`;
            div.className = `cell ${reds.includes(num) ? 'red' : 'black'}`;
            div.style.gridColumn = col + 1; div.style.gridRow = 4 - row;
            div.innerHTML = num;
            div.onclick = () => inputNum(num); table.appendChild(div);
        }
    }

    function toggleMode() {
        const mode = document.getElementById('modeDropdown').value;
        const btn = document.getElementById('processBtn');
        const lbl = document.getElementById('areaLabel');
        
        if(mode === 'sim') {
            lbl.innerText = "Full Simulation Mode (Process All at Once)";
            btn.innerText = "Run Full Simulation";
        } else {
            lbl.innerText = "Manual Mode: Paste Initial History Below";
            btn.innerText = "Load Initial History";
        }
    }

    function resetStats() {
        stats.bankroll = parseFloat(document.getElementById('inputBankroll').value) || 1000;
        stats.profit = 0; stats.lossStreak = 0; stats.currentUnitMult = 1;
        updateUI();
    }

    function handleBulk() {
        const mode = document.getElementById('modeDropdown').value;
        const raw = document.getElementById('bulkData').value;
        const nums = raw.split(/[\s,]+/).filter(x => x !== "").map(Number);
        
        if (mode === 'sim') {
            resetStats();
            history = [];
            nums.forEach(n => inputNum(n));
        } else {
            // In Manual mode, just add to history without calculating P/L for the paste itself
            history = [...nums];
            alert(nums.length + " numbers added to history. Now click a number to see neighbors.");
        }
    }

    function inputNum(n) {
        stateHistory.push(JSON.stringify({history: [...history], stats: {...stats}}));
        
        // P/L and Progression Logic
        if (currentPredictions.length > 0) {
            const baseUnit = parseFloat(document.getElementById('inputUnit').value);
            const betAmount = baseUnit * stats.currentUnitMult;
            
            if (currentPredictions.includes(n)) {
                // WIN
                let win = (betAmount * 36) - (currentPredictions.length * betAmount);
                stats.profit += win;
                stats.bankroll += win;
                stats.lossStreak = 0;
                stats.currentUnitMult = 1;
            } else {
                // LOSS
                let loss = currentPredictions.length * betAmount;
                stats.profit -= loss;
                stats.bankroll -= loss;
                stats.lossStreak++;
                // Progression: Increase 1 unit every 4 losses
                stats.currentUnitMult = Math.floor(stats.lossStreak / 4) + 1;
            }
        }

        // Search history for neighbors of 'n' BEFORE adding 'n' to history
        const results = findNeighbors(n);
        
        document.getElementById('leftNeighbors').innerText = results.left.join(' ');
        document.getElementById('rightNeighbors').innerText = results.right.join(' ');
        
        // Update predictions for the NEXT round
        currentPredictions = [...new Set([...results.left, ...results.right])];
        
        history.push(n);
        updateUI();
        
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('last-hit'));
        document.getElementById(`cell-${n}`).classList.add('last-hit');
    }

    function findNeighbors(target) {
        let leftOccurrences = [];
        let rightOccurrences = [];
        
        for (let i = 0; i < history.length; i++) {
            if (history[i] === target) {
                if (i > 0) leftOccurrences.push(history[i-1]);
                if (i < history.length - 1) rightOccurrences.push(history[i+1]);
            }
        }

        return {
            left: [...new Set(leftOccurrences)].sort((a,b) => a - b),
            right: [...new Set(rightOccurrences)].sort((a,b) => a - b)
        };
    }

    function updateUI() {
        document.getElementById('netTotal').innerText = stats.profit.toFixed(2);
        document.getElementById('netTotal').className = `val ${stats.profit >= 0 ? 'win' : 'loss'}`;
        document.getElementById('displayBankroll').innerText = stats.bankroll.toFixed(2);
        document.getElementById('displayStreak').innerText = stats.lossStreak;
        
        const base = parseFloat(document.getElementById('inputUnit').value);
        document.getElementById('displayBet').innerText = (base * stats.currentUnitMult).toFixed(2) + " (x" + stats.currentUnitMult + ")";
    }

    function undo() {
        if (stateHistory.length > 0) {
            const last = JSON.parse(stateHistory.pop());
            history = last.history;
            stats = last.stats;
            updateUI();
            // Clear display on undo
            document.getElementById('leftNeighbors').innerText = "";
            document.getElementById('rightNeighbors').innerText = "";
            currentPredictions = [];
        }
    }
</script>
</body>
</html>
